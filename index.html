<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Cinematic Pink Preloader */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ff9a9e; z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .loading-heart {
            font-size: 60px; color: white;
            animation: heartbeat 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8));
        }
        .loading-text {
            margin-top: 20px; font-family: 'Cinzel', serif; letter-spacing: 4px;
            font-size: 16px; color: white; font-weight: bold;
        }
        @keyframes heartbeat {
            0% { transform: scale(0.95); } 5% { transform: scale(1.15); }
            39% { transform: scale(0.85); } 45% { transform: scale(1); }
            60% { transform: scale(0.95); } 100% { transform: scale(0.95); }
        }

        /* Interactive Emoji Canvas */
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* Premium Glassmorphism Card */
        .login-container {
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(216, 27, 96, 0.2), inset 0 0 20px rgba(255,255,255,0.5);
            padding: 50px 40px; border-radius: 24px;
            text-align: center; max-width: 420px; width: 90%;
            transform-style: preserve-3d; transition: transform 0.1s ease-out, opacity 0.5s;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn { from { opacity: 0; transform: translateY(30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        #card-content { transition: opacity 0.5s ease; }

        .lock-icon {
            font-size: 45px; margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(216, 27, 96, 0.4));
            transform: translateZ(40px); transition: all 0.2s ease; display: inline-block;
        }

        h2 {
            font-family: 'Cinzel', serif; font-size: 28px; margin-bottom: 5px;
            color: #d81b60; letter-spacing: 2px; transform: translateZ(30px);
        }

        p.subtitle { color: #555; font-size: 14px; margin-bottom: 30px; font-weight: 600; transform: translateZ(20px); }

        .input-group { position: relative; margin-bottom: 5px; transform: translateZ(25px); }
        .input-group input {
            width: 100%; padding: 18px 20px;
            background: rgba(255, 255, 255, 0.7); border: 2px solid rgba(255, 182, 193, 0.8);
            border-radius: 12px; color: #d81b60; font-size: 18px; font-weight: bold; font-family: 'Poppins', sans-serif;
            outline: none; transition: all 0.3s ease; letter-spacing: 2px; text-align: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .input-group label {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #888; font-size: 16px; pointer-events: none; transition: 0.3s ease all; font-weight: 600;
        }
        .input-group input:focus, .input-group input:valid {
            border-color: #d81b60; box-shadow: 0 0 20px rgba(216, 27, 96, 0.3); background: rgba(255, 255, 255, 0.9);
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -12px; font-size: 12px; color: white; background: #d81b60;
            padding: 2px 10px; border-radius: 6px; letter-spacing: 1px;
        }

        #hint-box {
            display: none; color: #d81b60; font-size: 13px; margin-top: 15px;
            font-weight: bold; font-style: italic; transform: translateZ(15px);
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        button {
            margin-top: 35px; background: linear-gradient(135deg, #ff758c 0%, #d81b60 100%);
            color: white; font-weight: 600; letter-spacing: 1px; border: none;
            padding: 18px; border-radius: 12px; font-size: 16px; cursor: pointer; width: 100%;
            font-family: 'Poppins', sans-serif; transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(216, 27, 96, 0.4); transform: translateZ(30px);
        }
        button:hover { transform: translateZ(35px) scale(1.03); box-shadow: 0 15px 25px rgba(216, 27, 96, 0.6); }

        #error-message {
            color: white; margin-top: 25px; font-size: 14px; display: none; line-height: 1.6;
            background: #ff4d4d; border: 2px solid #cc0000; font-weight: 600;
            padding: 15px; border-radius: 12px; transform: translateZ(20px);
        }

        /* Full Screen Envelope Morph */
        #envelope-container {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .envelope-wrapper {
            position: relative; width: 220px; height: 150px; margin: 0 auto;
            background: #fff; border-radius: 10px 10px 20px 20px;
            box-shadow: 0 20px 50px rgba(216, 27, 96, 0.4);
            animation: floatEnv 2s infinite ease-in-out;
        }
        .envelope-flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 110px solid transparent; border-right: 110px solid transparent;
            border-top: 85px solid #ffe4e1; transform-origin: top;
            transition: transform 1s 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5;
        }
        .envelope-body {
            position: absolute; bottom: 0; left: 0; width: 0; height: 0;
            border-left: 110px solid #ffb6c1; border-right: 110px solid #ffb6c1;
            border-bottom: 75px solid #ffc0cb; border-top: 75px solid transparent;
            border-radius: 0 0 20px 20px; z-index: 4;
        }
        .envelope-letter {
            position: absolute; bottom: 15px; left: 15px; right: 15px; height: 120px;
            background: white; border-radius: 8px; z-index: 3;
            transition: transform 1s 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center;
            font-size: 40px;
        }
        .envelope-text {
            color: #d81b60; margin-top: 40px; font-family: 'Cinzel', serif; font-weight: bold;
            letter-spacing: 3px; font-size: 22px; opacity: 0; transition: opacity 1s 1.8s;
        }
        .open-envelope .envelope-flap { transform: rotateX(180deg); z-index: 2; }
        .open-envelope .envelope-letter { transform: translateY(-70px); }
        .open-envelope + .envelope-text { opacity: 1; }

        @keyframes floatEnv { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes shake {
            10%, 90% { transform: translate3d(-4px, 0, 0); }
            20%, 80% { transform: translate3d(6px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-10px, 0, 0); }
            40%, 60% { transform: translate3d(10px, 0, 0); }
        }
    </style>
</head>
<body>

    <audio id="successSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=success-1-6297.mp3"></audio>
    <audio id="errorSound" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3?filename=error-126627.mp3"></audio>

    <div id="preloader">
        <div class="loading-heart">💌</div>
        <div class="loading-text">SEALING THE ENVELOPE...</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="login-container" id="card">
        <div id="card-content">
            <div class="lock-icon" id="lockIcon">🔒</div>
            <h2>Happy Birthday</h2>
            <p class="subtitle">Only the right person holds the key.</p>
            
            <div class="input-group">
                <input type="password" id="passwordInput" required autocomplete="off">
                <label>Enter Password</label>
            </div>
            
            <p id="hint-box">✨ Hint: Cat Person 🐾</p>
            
            <button id="submitBtn" onclick="checkPassword()">Unlock Letter</button>
            <div id="error-message"></div>
        </div>
    </div>

    <div id="envelope-container">
        <div class="envelope-wrapper" id="envWrapper">
            <div class="envelope-flap"></div>
            <div class="envelope-letter">💌</div>
            <div class="envelope-body"></div>
        </div>
        <div class="envelope-text">OPENING MAGIC... ✨</div>
    </div>

    <script>
        // 1. Preloader Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                preloader.style.opacity = '0';
                setTimeout(() => { preloader.style.visibility = 'hidden'; }, 800);
            }, 1500); 
        });

        // 2. Interactive Emoji Particle Background
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;
        let mouse = { x: null, y: null };
        const emojis = ['🏎️', '⛓️', '🧆', '✨', '🤍'];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<35; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    size: Math.random() * 20 + 15,
                    vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
                    emoji: emojis[Math.floor(Math.random() * emojis.length)]
                });
            }
        }
        
        window.addEventListener('resize', initCanvas);
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            ctx.font = "24px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > width) p.vx *= -1;
                if(p.y < 0 || p.y > height) p.vy *= -1;
                
                // Repel from mouse
                if(mouse.x && mouse.y) {
                    let dx = mouse.x - p.x; let dy = mouse.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 120) {
                        p.x -= dx * 0.03; p.y -= dy * 0.03;
                    }
                }
                ctx.globalAlpha = 0.6;
                ctx.font = p.size + "px Arial";
                ctx.fillText(p.emoji, p.x, p.y);
            });
            requestAnimationFrame(animateCanvas);
        }
        initCanvas(); animateCanvas();

        // 3. 3D Tilt Effect
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth < 768) return; 
            let xAxis = (window.innerWidth / 2 - e.pageX) / 30;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        document.addEventListener('mouseleave', () => card.style.transform = `rotateY(0deg) rotateX(0deg)`);

        // 4. Dynamic Lock Icon
        const passInput = document.getElementById('passwordInput');
        const lockIcon = document.getElementById('lockIcon');
        passInput.addEventListener('input', () => {
            lockIcon.style.transform = 'translateZ(40px) scale(1.1)';
            setTimeout(() => { lockIcon.style.transform = 'translateZ(40px) scale(1)'; }, 100);
        });

        // 5. Password Verification & Transitions
        function checkPassword() {
            var password = passInput.value.toLowerCase().trim();
            var errorMessage = document.getElementById("error-message");
            var hintBox = document.getElementById("hint-box");
            var cardContent = document.getElementById("card-content");
            var envContainer = document.getElementById("envelope-container");
            var envWrapper = document.getElementById("envWrapper");
            
            var successAudio = document.getElementById("successSound");
            var errorAudio = document.getElementById("errorSound");

            if (password === "parth") {
                // SUCCESS
                successAudio.play();
                if (navigator.vibrate) navigator.vibrate(300);
                
                lockIcon.innerHTML = "🔓";
                cardContent.style.opacity = '0';
                
                setTimeout(() => {
                    card.style.display = 'none';
                    envContainer.style.display = 'flex';
                    setTimeout(() => envContainer.style.opacity = '1', 50);
                    
                    // Confetti
                    var duration = 3 * 1000;
                    var end = Date.now() + duration;
                    var interval = setInterval(function() {
                        if (Date.now() > end) return clearInterval(interval);
                        confetti({ startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000, colors: ['#d81b60', '#ff9a9e', '#ffffff'], origin: { x: Math.random(), y: Math.random() - 0.2 } });
                    }, 250);

                    // Open Envelope
                    setTimeout(() => { envWrapper.classList.add('open-envelope'); }, 800);

                    // Redirect to Drive Link
                    setTimeout(function() {
                        window.location.href = "https://drive.google.com/file/d/1A6P0wOg8XYdVfGjSDzjPtyT8GBPjoTFo/view?usp=sharing"; 
                    }, 3500); 

                }, 500);

            } else {
                // ERROR
                errorAudio.currentTime = 0; errorAudio.play();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                errorMessage.innerHTML = "You don't know me well to open the letter. Close the window! 🙄<br><br><span style='font-size:12px; font-weight:normal; color:#ffcccc;'>(Just kidding, try again!)</span>";
                errorMessage.style.display = "block";
                hintBox.style.display = "block";
                
                card.style.animation = "none";
                card.offsetHeight; /* trigger reflow */
                card.style.animation = "shake 0.5s cubic-bezier(.36,.07,.19,.97) both";
            }
        }

        passInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); checkPassword(); }
        });
    </script>
</body>
</html>
